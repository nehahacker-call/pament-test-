<!DOCTYPE html>
<html>
<head>

<title>Pan Booking</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="box">

<h2>🌿 Pan Booking</h2>


<label>Name</label>
<input type="text" id="name" placeholder="Your Name">


<label>Mobile</label>
<input type="number" id="mobile" placeholder="Mobile Number">


<label>Select Pan</label>

<select id="pan">

<option value="10">Normal Pan - ₹10</option>
<option value="30">Special Pan - ₹30</option>
<option value="50">Premium Pan - ₹50</option>

</select>


<label>Quantity</label>
<input type="number" id="qty" value="1">


<label>Booking Date</label>
<input type="date" id="date">


<h3 id="amount">
Total Amount: ₹10
</h3>


<button onclick="makePayment()">
💳 Pay Advance & Book
</button>


<div class="qr">

<h3>Scan UPI QR</h3>

<img src="upi-qr.png" width="200">

</div>


<p id="result"></p>


</div>


<script src="script.js"></script>


</body>

</html>
